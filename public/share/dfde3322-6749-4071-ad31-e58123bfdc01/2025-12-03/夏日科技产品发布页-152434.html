            background: rgba(255, 255, 255, 0.2);

        }

        .features {
            display: flex;

        }

        .feature-card {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin: 10px;
            flex: 1 1 calc(30% - 20px);
            text-align: center;
            transition: transform 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .scene-showcase {
            text-align: center;
            margin: 40px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);

            background: #10A5A6;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .cta-button:hover {
            background: #0f7b79;
        }

        @media (max-width: 768px) {
            .feature-card {
                flex: 1 1 100%;
            }

            .hero {
                height: auto;
                padding: 20px;
            }
        }
